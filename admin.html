<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - Raghav Enterprises</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px}
h2{text-align:center;color:#e60000}
.card{background:#fff;padding:15px;margin:10px;border-radius:10px}
input,button{padding:10px;margin:5px;border-radius:5px;border:1px solid #ccc}
button{background:#e60000;color:#fff;border:none;cursor:pointer}
img{width:80px;height:80px;border-radius:10px;object-fit:cover}
</style>
</head>

<body>

<h2>Admin Panel</h2>

<!-- LOGIN -->
<div id="login">
<input type="password" id="pass" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">

<h3>Add Product</h3>
<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input type="file" id="pimg">
<button onclick="addProduct()">Add Product</button>

<h3>Products</h3>
<div id="products"></div>

<h3>Orders</h3>
<div id="orders"></div>

</div>

<script>
const PASSWORD = "9450";

function login(){
 let p = document.getElementById('pass').value;
 if(p === PASSWORD){
  document.getElementById('login').style.display="none";
  document.getElementById('panel').style.display="block";
  loadProducts();
  loadOrders();
 } else {
  alert("Wrong Password");
 }
}

// PRODUCTS
let products = JSON.parse(localStorage.getItem('products')) || [];

function saveProducts(){
 localStorage.setItem('products', JSON.stringify(products));
}

function loadProducts(){
 let div = document.getElementById('products');
 div.innerHTML='';

 products.forEach((p,i)=>{
  div.innerHTML += `
  <div class="card">
   <img src="${p.img || 'https://via.placeholder.com/80'}"><br>
   ${p.name} - ₹${p.price}<br>
   <button onclick="deleteProduct(${i})">Delete</button>
  </div>`;
 });
}

function addProduct(){
 let name = document.getElementById('pname').value;
 let price = document.getElementById('pprice').value;
 let file = document.getElementById('pimg').files[0];

 if(!name || !price){
  alert("Enter name and price");
  return;
 }

 if(file){
  let reader = new FileReader();
  reader.onload = function(e){
    products.push({
      name:name,
      price:price,
      img:e.target.result
    });
    saveProducts();
    loadProducts();
  };
  reader.readAsDataURL(file);
 } else {
  products.push({name:name,price:price,img:''});
  saveProducts();
  loadProducts();
 }
}

function deleteProduct(i){
 products.splice(i,1);
 saveProducts();
 loadProducts();
}

// ORDERS
function loadOrders(){
 let orders = JSON.parse(localStorage.getItem('orders')) || [];
 let div = document.getElementById('orders');
 div.innerHTML='';

 orders.forEach(o=>{
  let items='';
  for(let i in o.cart){
    if(o.cart[i]>0){
      items += i + " x " + o.cart[i] + "<br>";
    }
  }

  div.innerHTML += `
  <div class="card">
   <b>${o.user.name}</b> (${o.user.mobile})<br>
   ${items}
  </div>`;
 });
}
</script>

</body>
</html>
